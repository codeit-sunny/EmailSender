<!DOCTYPE html>
<html lang="en">

<head>
    <title>Home - Mail Sender</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#667eea,#764ba2);
        }

        .container{
            text-align:center;
            background:white;
            padding:50px 60px;
            border-radius:12px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:15px;
            color:#333;
        }

        p{
            margin-bottom:25px;
            color:#666;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#667eea;
            color:white;
            text-decoration:none;
            font-size:16px;
            border-radius:6px;
            transition:0.3s;
        }

        .btn:hover{
            background:#5563d6;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Mail Sender Project</h1>
        <p>Welcome! Click the button below to send a message.</p>

        <a href="{% url 'contact' %}" class="btn">Open Contact Form</a>

    </div>

</body>

</html>
